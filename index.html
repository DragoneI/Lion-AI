<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Lion AI – Assistant IA</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#EF4444">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Lion AI">
  <meta name="description" content="Lion AI – Votre assistant IA intelligent avec recherche web, analyse de documents et d'images.">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── SIDEBAR ── -->
<aside class="sidebar" id="sidebar" aria-label="Historique des conversations" role="navigation">
  <div class="sidebar-top">
    <div class="sidebar-brand">
      <img src="logo.svg" alt="Lion AI" onerror="this.parentElement.innerHTML='<span style=font-size:24px>🦁</span>';">
      <span class="brand-name">Lion AI</span>
    </div>
    <button class="new-chat-btn" id="newChatSidebarBtn" aria-label="Nouvelle discussion">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nouvelle discussion
    </button>
  </div>
  <div class="conv-label">Historique</div>
  <div class="conversation-list" id="conversationList" role="list"></div>
  <button class="logout-btn" id="logoutBtn" aria-label="Se déconnecter">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
    Se déconnecter
  </button>
</aside>
<div class="overlay" id="overlay" aria-hidden="true"></div>

<!-- ── MAIN ── -->
<main class="main" role="main">
  <header class="top-bar">
    <button class="hamburger-btn" id="hamburgerBtn" aria-label="Menu">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="topbar-brand">
      <img src="logo.svg" alt="Lion AI" onerror="this.parentElement.innerHTML='<span style=font-size:20px>🦁</span>';">
      <span class="topbar-title">Lion AI</span>
    </div>
    <button class="new-discussion-btn" id="newChatTopBtn" aria-label="Nouveau">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nouveau
    </button>
  </header>

  <div class="chat-container" id="chatContainer" role="log" aria-live="polite" aria-label="Conversation"></div>

  <div class="input-area">
    <div class="input-area-inner">
      <div class="input-shell" role="form" aria-label="Zone de message">

        <!-- 📄 Document RAG -->
        <button class="rag-btn" id="ragUploadBtn" title="Ajouter un document" aria-label="Ajouter un document">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="12" y1="18" x2="12" y2="12"/>
            <line x1="9" y1="15" x2="15" y2="15"/>
          </svg>
        </button>

        <!-- 🖼️ Image vision -->
        <button class="img-btn" id="imgUploadBtn" title="Analyser une image" aria-label="Analyser une image">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </button>

        <textarea id="userInput" rows="1" placeholder="Envoyer un message…" aria-label="Votre message"></textarea>

        <!-- 🎤 Micro STT -->
        <button class="mic-btn" id="micBtn" title="Parler à Lion AI" aria-label="Parler à Lion AI">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>

        <!-- 🌐 Web search -->
        <button class="web-search-btn" id="webSearchBtn" title="Forcer la recherche web" aria-label="Forcer la recherche web" aria-pressed="false">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </button>

        <button class="send-btn" id="sendBtn" disabled aria-label="Envoyer le message">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
          </svg>
        </button>

      </div>

      <!-- Inputs fichiers cachés -->
      <input type="file" id="ragFileInput" accept=".txt,.md,.csv,.pdf" style="display:none;" aria-hidden="true">
      <input type="file" id="imgFileInput" accept="image/jpeg,image/png,image/webp,image/gif" style="display:none;" aria-hidden="true">

      <div class="input-hint" aria-hidden="true">
        <span class="hint-item">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 10 4 15 9 20"/><path d="M20 4v7a4 4 0 0 1-4 4H4"/></svg>
          Entrée
        </span>
        <span class="hint-sep">·</span>
        <span class="hint-item">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Doc
        </span>
        <span class="hint-sep">·</span>
        <span class="hint-item">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Image
        </span>
        <span class="hint-sep">·</span>
        <span class="hint-item">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg>
          Voix
        </span>
        <span class="hint-sep">·</span>
        <span class="hint-item">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          Web
        </span>
      </div>
    </div>
  </div>
</main>

<!-- ── CONTEXT MENU ── -->
<div class="ctx-menu" id="ctxMenu" role="menu" aria-label="Actions sur le message" hidden>
  <div class="ctx-item" id="ctxEdit" role="menuitem" tabindex="0">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    Modifier
  </div>
  <div class="ctx-item" id="ctxCopy" role="menuitem" tabindex="0">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    Copier
  </div>
  <div class="ctx-sep" aria-hidden="true"></div>
  <div class="ctx-item" id="ctxRetry" role="menuitem" tabindex="0">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
    Renvoyer
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
