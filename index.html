<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Lion AI – Assistant IA</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#EF4444">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Lion AI">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── SIDEBAR ── -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-top">
    <div class="sidebar-brand">
      <img src="logo.svg" alt="Lion AI" onerror="this.parentElement.innerHTML='<span style=font-size:24px>🦁</span>';">
      <span class="brand-name">Lion AI</span>
    </div>
    <button class="new-chat-btn" id="newChatSidebarBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nouvelle discussion
    </button>
  </div>
  <div class="conv-label">Historique</div>
  <div class="conversation-list" id="conversationList"></div>
  <button class="logout-btn" id="logoutBtn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
    Se déconnecter
  </button>
</div>
<div class="overlay" id="overlay"></div>

<!-- ── MAIN ── -->
<div class="main">
  <div class="top-bar">
    <button class="hamburger-btn" id="hamburgerBtn">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="topbar-brand">
      <img src="logo.svg" alt="Lion AI" onerror="this.parentElement.innerHTML='<span style=font-size:20px>🦁</span>';">
      <span class="topbar-title">Lion AI</span>
    </div>
    <button class="new-discussion-btn" id="newChatTopBtn">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nouveau
    </button>
  </div>

  <div class="chat-container" id="chatContainer"></div>

  <div class="input-area">
    <div class="input-area-inner">
      <div class="input-shell">

        <!-- 📄 Document RAG -->
        <button class="rag-btn" id="ragUploadBtn" title="Ajouter un document">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="12" y1="18" x2="12" y2="12"/>
            <line x1="9" y1="15" x2="15" y2="15"/>
          </svg>
        </button>

        <!-- 🖼️ Image vision -->
        <button class="img-btn" id="imgUploadBtn" title="Analyser une image">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </button>

        <textarea id="userInput" rows="1" placeholder="Envoyer un message…"></textarea>

        <!-- 🎤 Micro STT -->
        <button class="mic-btn" id="micBtn" title="Parler à Lion AI">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>

        <button class="web-search-btn" id="webSearchBtn" title="Forcer la recherche web">🌐</button>

        <button class="send-btn" id="sendBtn" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
          </svg>
        </button>

      </div>

      <!-- Inputs fichiers cachés -->
      <input type="file" id="ragFileInput" accept=".txt,.md,.csv,.pdf" style="display:none;">
      <input type="file" id="imgFileInput" accept="image/jpeg,image/png,image/webp,image/gif" style="display:none;">

      <div class="input-hint">Entrée · 📄 doc · 🖼️ image · 🎤 voix · 🌐 web</div>
    </div>
  </div>
</div>

<!-- ── CONTEXT MENU ── -->
<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item" id="ctxEdit">✏️ Modifier</div>
  <div class="ctx-item" id="ctxCopy">📋 Copier</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" id="ctxRetry">↩ Renvoyer</div>
</div>

<script src="script.js"></script>
</body>
</html>
