<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Lion AI – Connexion</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --red: #EF4444;
      --red-dark: #DC2626;
      --red-pale: #FEF2F2;
      --red-glow: rgba(239,68,68,0.12);
      --green: #10B981;
      --green-pale: #ECFDF5;
      --green-dark: #059669;
      --blue: #3B82F6;
      --blue-pale: #EFF6FF;
      --white: #FFFFFF;
      --gray-50: #F9FAFB;
      --gray-100: #F3F4F6;
      --gray-200: #E5E7EB;
      --gray-300: #D1D5DB;
      --gray-400: #9CA3AF;
      --gray-500: #6B7280;
      --gray-700: #374151;
      --gray-900: #111827;
      --radius-sm: 10px;
      --radius-md: 20px;
      --radius-lg: 28px;
      --ease: cubic-bezier(0.4,0,0.2,1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'DM Sans', -apple-system, system-ui, sans-serif;
      background: var(--white);
      color: var(--gray-900);
      height: 100dvh;
      display: flex;
      overflow: hidden;
    }

    .auth-screen {
      display: flex;
      width: 100%;
      height: 100%;
    }

    /* Panneau gauche décoratif */
    .auth-panel-left {
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 3rem 3.5rem;
      background: linear-gradient(145deg, #1a0505 0%, #3b0a0a 50%, #7f1d1d 100%);
      position: relative;
      overflow: hidden;
      flex: 0 0 42%;
    }

    .auth-panel-glow {
      position: absolute;
      width: 360px; height: 360px;
      background: radial-gradient(circle, rgba(239,68,68,0.35) 0%, transparent 70%);
      top: -60px; right: -80px;
      pointer-events: none;
    }

    .auth-brand-large {
      display: flex; align-items: center; gap: 0.9rem;
      margin-bottom: 2.5rem; position: relative; z-index: 1;
    }
    .auth-brand-large img {
      width: 52px; height: 52px; object-fit: contain;
      filter: drop-shadow(0 0 16px rgba(239,68,68,0.6));
    }
    .auth-brand-name {
      font-size: 1.8rem; font-weight: 600;
      color: var(--white); letter-spacing: -0.02em;
    }
    .auth-panel-tagline {
      font-size: 1.15rem; font-weight: 300;
      color: rgba(255,255,255,0.65); line-height: 1.65;
      position: relative; z-index: 1; margin-bottom: 3rem;
    }
    .auth-panel-dots { display: flex; gap: 0.5rem; position: relative; z-index: 1; }
    .auth-panel-dots span {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,0.2);
    }
    .auth-panel-dots span:first-child {
      background: var(--red); box-shadow: 0 0 8px rgba(239,68,68,0.6);
    }

    /* Panneau droit */
    .auth-panel-right {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 2rem 1.5rem; overflow-y: auto; background: var(--white);
    }

    .auth-form-wrapper {
      width: 100%; max-width: 380px;
      display: flex; flex-direction: column; gap: 0;
      animation: authSlideIn 0.32s var(--ease);
    }
    @keyframes authSlideIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .auth-form-header { margin-bottom: 1.8rem; }
    .auth-form-title {
      font-size: 1.6rem; font-weight: 600; color: var(--gray-900);
      letter-spacing: -0.02em; margin-bottom: 0.3rem;
    }
    .auth-form-subtitle { font-size: 0.88rem; color: var(--gray-400); font-weight: 400; }

    /* Google */
    .google-btn {
      width: 100%; padding: 0.78rem 1rem;
      background: var(--white); color: var(--gray-700);
      border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm);
      font-family: inherit; font-size: 0.88rem; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      gap: 0.6rem; transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
      margin-bottom: 1.4rem;
    }
    .google-btn:hover {
      background: var(--gray-50); border-color: var(--gray-300);
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .google-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* Divider */
    .auth-divider {
      display: flex; align-items: center; gap: 0.7rem; margin-bottom: 1.4rem;
    }
    .auth-divider-line { flex: 1; height: 1px; background: var(--gray-200); }
    .auth-divider-text {
      font-size: 0.75rem; color: var(--gray-400); font-weight: 500; white-space: nowrap;
    }

    /* Formulaire */
    .auth-form { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.2rem; }

    .field-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .field-label { font-size: 0.8rem; font-weight: 500; color: var(--gray-700); display: block; }

    .auth-input {
      width: 100%; padding: 0.75rem 1rem;
      border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm);
      font-family: inherit; font-size: 0.9rem; color: var(--gray-900);
      background: var(--gray-50); outline: none;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }
    .auth-input::placeholder { color: var(--gray-300); }
    .auth-input:focus {
      border-color: var(--red); box-shadow: 0 0 0 3px var(--red-glow); background: var(--white);
    }

    .input-password-wrap { position: relative; width: 100%; }
    .input-password-wrap .auth-input { padding-right: 46px; }
    .eye-toggle {
      position: absolute; right: 3px; top: 50%; transform: translateY(-50%);
      width: 38px; height: 38px; border: none; background: none;
      cursor: pointer; color: var(--gray-400);
      display: flex; align-items: center; justify-content: center;
      border-radius: 7px; transition: color 0.12s, background 0.12s; z-index: 2;
    }
    .eye-toggle:hover { color: var(--gray-700); background: var(--gray-100); }
    .eye-toggle svg { width: 18px; height: 18px; }

    /* Bouton */
    .auth-btn {
      width: 100%; padding: 0.82rem 1.2rem;
      background: var(--red); color: var(--white); border: none;
      border-radius: var(--radius-sm); font-family: inherit;
      font-size: 0.92rem; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      margin-top: 0.3rem; box-shadow: 0 4px 14px rgba(239,68,68,0.3);
    }
    .auth-btn:hover { background: var(--red-dark); box-shadow: 0 6px 20px rgba(239,68,68,0.38); }
    .auth-btn:active { transform: scale(0.98); }
    .auth-btn-arrow { width: 16px; height: 16px; transition: transform 0.2s; }
    .auth-btn:hover .auth-btn-arrow { transform: translateX(3px); }

    /* Switch */
    .auth-switch-line { text-align: center; font-size: 0.84rem; color: var(--gray-400); margin-top: 1.5rem; }
    .auth-switch { color: var(--red); font-weight: 600; cursor: pointer; margin-left: 0.3rem; }
    .auth-switch:hover { text-decoration: underline; }

    /* Messages */
    #authMessageContainer { margin-bottom: 0.6rem; }
    .auth-message {
      padding: 0.75rem 1rem; border-radius: var(--radius-sm);
      font-size: 0.83rem; line-height: 1.55; width: 100%;
      display: flex; gap: 0.6rem; align-items: flex-start;
      animation: msgIn 0.2s var(--ease);
    }
    @keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .auth-message.error { background: var(--red-pale); color: #B91C1C; border: 1px solid #FECACA; }
    .auth-message.success { background: var(--green-pale); color: var(--green-dark); border: 1px solid #A7F3D0; }
    .auth-message.info { background: var(--blue-pale); color: #1D4ED8; border: 1px solid #BFDBFE; }
    .auth-message-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
    .auth-message strong { display: block; margin-bottom: 0.15rem; font-weight: 600; }

    @media (min-width: 768px) {
      .auth-panel-left { display: flex; }
    }
  </style>
</head>
<body>

<div class="auth-screen">
  <!-- Panneau gauche -->
  <div class="auth-panel-left">
    <div class="auth-panel-glow"></div>
    <div class="auth-brand-large">
      <img src="logo.svg" alt="Lion AI" onerror="this.parentElement.innerHTML='<span style=font-size:48px>🦁</span>';">
      <span class="auth-brand-name">Lion AI</span>
    </div>
    <p class="auth-panel-tagline">Votre assistant intelligent,<br>toujours prêt à vous répondre.</p>
    <div class="auth-panel-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- Panneau droit -->
  <div class="auth-panel-right">
    <div class="auth-form-wrapper">
      <div class="auth-form-header">
        <h2 class="auth-form-title" id="authFormTitle">Bon retour 👋</h2>
        <p class="auth-form-subtitle" id="authFormSubtitle">Connectez-vous à votre compte</p>
      </div>

      <div id="authMessageContainer"></div>

      <button class="google-btn" id="googleBtn">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continuer avec Google
      </button>

      <div class="auth-divider">
        <span class="auth-divider-line"></span>
        <span class="auth-divider-text">ou par email</span>
        <span class="auth-divider-line"></span>
      </div>

      <form class="auth-form" id="authForm" novalidate>
        <div class="field-group">
          <label class="field-label" for="authEmail">Email</label>
          <input type="email" class="auth-input" id="authEmail" placeholder="vous@exemple.com" required autocomplete="email">
        </div>
        <div class="field-group">
          <label class="field-label" for="authPassword">Mot de passe</label>
          <div class="input-password-wrap">
            <input type="password" class="auth-input" id="authPassword" placeholder="••••••••" required minlength="6" autocomplete="current-password">
            <button type="button" class="eye-toggle" id="eyeToggle" tabindex="-1">
              <svg id="eyeOffIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
              <svg id="eyeOnIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" class="auth-btn" id="authSubmit">
          <span id="authSubmitText">Se connecter</span>
          <svg class="auth-btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </form>

      <p class="auth-switch-line">
        <span id="authSwitchLabel">Pas encore de compte ?</span>
        <span class="auth-switch" id="authSwitch">Créer un compte</span>
      </p>
    </div>
  </div>
</div>

<script src="auth.js"></script>
</body>
</html>
